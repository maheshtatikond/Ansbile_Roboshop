- name: mongodb configure
  hosts: 13.222.162.18
  become: true
 
  tasks:
    - name: copy mongodb repo file
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongodb.repo

    - name: install mongodb
      ansible.builtin.dnf:
        name: mongodb-org
        state: present

    - name : replace bind ip address #allow remote access to mongodb
      ansible.builtin.replace:   
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'

    - name: start mongodb
      ansible.builtin.service:
        name: mongod
        state: started
        enabled: true
    - name: restart mongodb
      ansible.builtin.service:
        name: mongod
        state: restarted    